---
# Istio Gateway for external traffic
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: aframp-gateway
  namespace: aframp-production
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: aframp-tls-cert
    hosts:
    - "api.aframp.com"
    - "*.api.aframp.com"
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "api.aframp.com"
    - "*.api.aframp.com"
    tls:
      httpsRedirect: true
---
# Virtual Service for API routing
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: aframp-api
  namespace: aframp-production
spec:
  hosts:
  - "api.aframp.com"
  gateways:
  - aframp-gateway
  http:
  - match:
    - uri:
        prefix: "/api/v1"
    route:
    - destination:
        host: aframp-api.aframp-production.svc.cluster.local
        port:
          number: 80
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,reset,connect-failure,refused-stream
---
# Destination Rule for circuit breaking
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: aframp-api
  namespace: aframp-production
spec:
  host: aframp-api.aframp-production.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 1000
      http:
        http1MaxPendingRequests: 1000
        http2MaxRequests: 1000
        maxRequestsPerConnection: 2
    outlierDetection:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 40
    tls:
      mode: ISTIO_MUTUAL
---
# Peer Authentication for mTLS
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: aframp-production
spec:
  mtls:
    mode: STRICT
---
# Authorization Policy - Allow all authenticated traffic
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-authenticated
  namespace: aframp-production
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/aframp-production/sa/*"]
---
# Authorization Policy - Deny external access to internal services
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-external-to-internal
  namespace: aframp-production
spec:
  action: DENY
  rules:
  - from:
    - source:
        notNamespaces: ["aframp-production"]
    to:
    - operation:
        paths: ["/internal/*"]
---
# Request Authentication for JWT validation
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-auth
  namespace: aframp-production
spec:
  selector:
    matchLabels:
      app: aframp-api
  jwtRules:
  - issuer: "https://api.aframp.com"
    jwksUri: "https://api.aframp.com/.well-known/jwks.json"
    audiences:
    - "aframp-api"
