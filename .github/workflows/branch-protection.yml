name: Branch Protection

on:
    workflow_dispatch:

jobs:
    enforce-protection:
        name: Enforce branch protection
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            administration: write
        steps:
            - name: "Apply protection to default branch"
              uses: actions/github-script@v6
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      // Determine the default branch (master or main)
                      const { data: repoData } = await github.rest.repos.get({ owner, repo });
                      const branch = repoData.default_branch;
                      console.log(`Applying protection to default branch: ${branch}`);

                      await github.rest.repos.updateBranchProtection({
                        owner,
                        repo,
                        branch,
                        required_status_checks: {
                          strict: true,
                          contexts: [
                            'Verify PR target branch',
                            'Lint (clippy)',
                            'Unit Tests & Coverage',
                            'Integration Tests (Postgres + Redis)',
                            'Security Scan (cargo-audit)'
                          ]
                        },
                        enforce_admins: false,
                        required_pull_request_reviews: {
                          require_code_owner_reviews: false,
                          required_approving_review_count: 1
                        },
                        restrictions: null
                      });
                      console.log(`Protection policy applied to ${branch}`);

            - name: "Dump current protection config"
              uses: actions/github-script@v6
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const { data: repoData } = await github.rest.repos.get({ owner, repo });
                      const branch = repoData.default_branch;
                      const { data } = await github.rest.repos.getBranchProtection({
                        owner, repo, branch
                      });
                      console.log(JSON.stringify(data, null, 2));
