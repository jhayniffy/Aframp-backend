---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: aframp-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'aframp-production'
        region: 'REGION_NAME'
    
    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager:9093
    
    rule_files:
      - '/etc/prometheus/rules/*.yml'
    
    scrape_configs:
    # Kubernetes API server
    - job_name: 'kubernetes-apiservers'
      kubernetes_sd_configs:
      - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https
    
    # Kubernetes nodes
    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
    
    # Kubernetes pods
    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
    
    # Aframp API metrics
    - job_name: 'aframp-api'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - aframp-production
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: aframp-api
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: metrics
    
    # CockroachDB metrics
    - job_name: 'cockroachdb'
      static_configs:
      - targets:
        - 'cockroachdb.aframp.internal:8080'
      metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'cockroach_.*'
        action: keep
    
    # Redis metrics
    - job_name: 'redis'
      static_configs:
      - targets:
        - 'redis-primary.aframp.internal:9121'
        - 'redis-lagos.aframp.internal:9121'
        - 'redis-nairobi.aframp.internal:9121'
    
    # Istio metrics
    - job_name: 'istio-mesh'
      kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
          - istio-system
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: istio-telemetry;prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: aframp-monitoring
data:
  aframp-alerts.yml: |
    groups:
    - name: aframp_slo
      interval: 30s
      rules:
      # API Availability SLO: 99.9%
      - alert: APIAvailabilitySLOBreach
        expr: |
          (
            sum(rate(http_requests_total{job="aframp-api",status=~"2.."}[5m]))
            /
            sum(rate(http_requests_total{job="aframp-api"}[5m]))
          ) < 0.999
        for: 5m
        labels:
          severity: critical
          slo: availability
        annotations:
          summary: "API availability below 99.9% SLO"
          description: "API availability is {{ $value | humanizePercentage }} (target: 99.9%)"
      
      # API Latency SLO: P99 < 500ms
      - alert: APILatencySLOBreach
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job="aframp-api"}[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          slo: latency
        annotations:
          summary: "API P99 latency above 500ms SLO"
          description: "API P99 latency is {{ $value | humanizeDuration }} (target: 500ms)"
      
      # Database Replication Lag
      - alert: DatabaseReplicationLagHigh
        expr: cockroach_replication_lag_seconds > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Database replication lag is high"
          description: "Replication lag is {{ $value }}s (threshold: 5s)"
      
      # Redis Memory Usage
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"
      
      # Pod Restart Rate
      - alert: PodRestartingFrequently
        expr: rate(kube_pod_container_status_restarts_total{namespace="aframp-production"}[15m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} is restarting frequently"
          description: "Pod restart rate: {{ $value }} restarts/sec"
      
      # Circuit Breaker Open
      - alert: CircuitBreakerOpen
        expr: istio_requests_total{response_code="503",connection_security_policy="mutual_tls"} > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker is open for {{ $labels.destination_service }}"
          description: "Circuit breaker has opened, blocking requests"
