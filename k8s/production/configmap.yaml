---
# Application Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: aframp-config
  namespace: aframp-production
data:
  # Application settings
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  
  # Stellar Network
  STELLAR_NETWORK: "public"
  HORIZON_URL: "https://horizon.stellar.org"
  
  # Feature flags
  ENABLE_ANALYTICS: "true"
  ENABLE_ABUSE_DETECTION: "true"
  ENABLE_RATE_LIMITING: "true"
  
  # Performance tuning
  MAX_CONNECTIONS: "1000"
  CONNECTION_TIMEOUT: "30"
  REQUEST_TIMEOUT: "60"
  
  # Worker configuration
  WORKER_CONCURRENCY: "10"
  WORKER_QUEUE_SIZE: "1000"
  
  # Cache configuration
  CACHE_TTL: "300"
  CACHE_MAX_SIZE: "1000000"
---
# Nginx Configuration for reverse proxy
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: aframp-production
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    
    events {
        worker_connections 4096;
        use epoll;
        multi_accept on;
    }
    
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';
        
        access_log /var/log/nginx/access.log main;
        
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 10M;
        
        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript 
                   application/json application/javascript application/xml+rss;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
        limit_req_status 429;
        
        upstream aframp_api {
            least_conn;
            server aframp-api:80 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }
        
        server {
            listen 80;
            server_name _;
            
            # Health check endpoint
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
            
            # API endpoints with rate limiting
            location /api/ {
                limit_req zone=api_limit burst=20 nodelay;
                
                proxy_pass http://aframp_api;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                
                proxy_connect_timeout 30s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
                
                proxy_buffering off;
                proxy_request_buffering off;
            }
        }
    }
---
# Horizon Proxy Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: horizon-proxy-config
  namespace: aframp-production
data:
  config.yaml: |
    # Horizon caching proxy configuration
    upstream:
      url: "https://horizon.stellar.org"
      timeout: 30s
    
    cache:
      enabled: true
      ttl: 300s
      max_size: 1GB
      
    endpoints:
      # Cacheable endpoints
      - path: "/ledgers/*"
        cache_ttl: 300s
        methods: ["GET"]
      
      - path: "/transactions/*"
        cache_ttl: 60s
        methods: ["GET"]
      
      - path: "/accounts/*/transactions"
        cache_ttl: 30s
        methods: ["GET"]
      
      # Non-cacheable endpoints
      - path: "/transactions"
        cache_ttl: 0s
        methods: ["POST"]
    
    rate_limiting:
      enabled: true
      requests_per_second: 100
      burst: 200
