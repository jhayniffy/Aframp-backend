# PodMonitor — tells the Prometheus Operator to scrape /metrics from every
# aframp-backend pod. Requires prometheus-operator CRDs to be installed.
# If using plain Prometheus (no operator), use a scrape_configs job instead.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: aframp-backend
  namespace: monitoring
  labels:
    release: prometheus   # must match the Prometheus CR's podMonitorSelector
spec:
  selector:
    matchLabels:
      app: aframp-backend
  namespaceSelector:
    any: true
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
