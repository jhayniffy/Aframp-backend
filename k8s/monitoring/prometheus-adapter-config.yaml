# Prometheus Adapter configuration.
#
# This ConfigMap is mounted by the prometheus-adapter Deployment (installed via
# the Terraform module in terraform/). It teaches the Kubernetes custom-metrics
# API how to translate raw Prometheus counters into the per-pod rate that the
# HPA consumes as `requests_per_second`.
#
# After applying, verify with:
#   kubectl get --raw "/apis/custom.metrics.k8s.io/v1beta1" | jq .
#   kubectl get --raw \
#     "/apis/custom.metrics.k8s.io/v1beta1/namespaces/default/pods/*/requests_per_second" \
#     | jq .
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-config
  namespace: monitoring
data:
  config.yaml: |
    rules:
      # -----------------------------------------------------------------------
      # requests_per_second
      # Exposes the per-pod HTTP request rate derived from the
      # aframp_http_requests_total counter already exported by the Rust service.
      # The HPA targets an averageValue of 80 req/s per pod.
      # -----------------------------------------------------------------------
      - seriesQuery: 'aframp_http_requests_total{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
            pod:
              resource: pod
        name:
          matches: "aframp_http_requests_total"
          as: "requests_per_second"
        metricsQuery: |
          sum(rate(aframp_http_requests_total{<<.LabelMatchers>>}[2m]))
          by (<<.GroupBy>>)

      # -----------------------------------------------------------------------
      # requests_in_flight
      # Exposes the current in-flight gauge for optional HPA use or dashboards.
      # -----------------------------------------------------------------------
      - seriesQuery: 'aframp_http_requests_in_flight{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
            pod:
              resource: pod
        name:
          matches: "aframp_http_requests_in_flight"
          as: "requests_in_flight"
        metricsQuery: |
          sum(aframp_http_requests_in_flight{<<.LabelMatchers>>})
          by (<<.GroupBy>>)
