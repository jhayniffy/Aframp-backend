# Ensures at least one pod is always available during voluntary disruptions
# (node drains, rolling updates). Works in concert with HPA minReplicas >= 2.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aframp-backend-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: aframp-backend
