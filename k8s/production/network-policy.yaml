---
# Network Policy - Default Deny All
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: aframp-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Network Policy - Allow API ingress from Istio
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: aframp-production
spec:
  podSelector:
    matchLabels:
      app: aframp-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 8080
  - from:
    - namespaceSelector:
        matchLabels:
          name: aframp-monitoring
    ports:
    - protocol: TCP
      port: 9090
---
# Network Policy - Allow API egress to database and Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress
  namespace: aframp-production
spec:
  podSelector:
    matchLabels:
      app: aframp-api
  policyTypes:
  - Egress
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow database access
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 26257
  # Allow Redis access
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 6379
  # Allow Stellar Horizon
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443
  # Allow internal service mesh
  - to:
    - namespaceSelector:
        matchLabels:
          name: aframp-production
---
# Network Policy - Allow worker egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-egress
  namespace: aframp-production
spec:
  podSelector:
    matchLabels:
      app: aframp-worker
  policyTypes:
  - Egress
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow database and Redis
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 26257
    - protocol: TCP
      port: 6379
  # Allow API calls
  - to:
    - podSelector:
        matchLabels:
          app: aframp-api
    ports:
    - protocol: TCP
      port: 8080
---
# Network Policy - Allow monitoring scraping
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: aframp-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: aframp-monitoring
    ports:
    - protocol: TCP
      port: 9090
