apiVersion: v1
kind: Service
metadata:
  name: aframp-backend
  namespace: aframp
  labels:
    app: aframp-backend
spec:
  selector:
    app: aframp-backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aframp-backend-ingress
  namespace: aframp
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.aframp.io
      secretName: aframp-tls
  rules:
    - host: api.aframp.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aframp-backend
                port:
                  number: 80
