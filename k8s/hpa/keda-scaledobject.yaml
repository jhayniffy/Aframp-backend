# KEDA ScaledObject — alternative to the native HPA above.
# Use this when KEDA is installed in the cluster (keda.sh).
# KEDA manages its own HPA under the hood and supports richer trigger types.
#
# To use: apply this file instead of hpa.yaml (not both simultaneously).
#   kubectl apply -f keda-scaledobject.yaml
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: aframp-backend-scaledobject
spec:
  scaleTargetRef:
    name: aframp-backend

  minReplicaCount: 2
  maxReplicaCount: 20

  # Cooldown: wait 300 s of idle before scaling to zero / minimum.
  cooldownPeriod: 300
  # Poll Prometheus every 15 s.
  pollingInterval: 15

  triggers:
    # Trigger 1: HTTP request throughput via Prometheus
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
        metricName: aframp_requests_per_second
        # Rate of requests over the last 2 minutes, per pod.
        query: |
          sum(rate(aframp_http_requests_total[2m])) /
          count(kube_pod_info{pod=~"aframp-backend-.*"})
        # Scale out when average req/s per pod exceeds 80.
        threshold: "80"

    # Trigger 2: CPU utilisation (fallback)
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
