apiVersion: apps/v1
kind: Deployment
metadata:
  name: aframp-backend
  labels:
    app: aframp-backend
spec:
  # Base replica count; HPA overrides this at runtime.
  replicas: 2
  selector:
    matchLabels:
      app: aframp-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime rollouts
  template:
    metadata:
      labels:
        app: aframp-backend
      annotations:
        # Prometheus scrape config — picked up by the Prometheus Operator
        # PodMonitor or by a scrape_configs static job.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: aframp-backend
          image: ghcr.io/kellymusk/aframp-backend:latest
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: RUST_LOG
              value: "info"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aframp-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aframp-secrets
                  key: redis-url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          # Allow in-flight requests to drain before the pod is removed.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
