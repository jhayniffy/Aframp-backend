apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aframp-backend-hpa
  namespace: aframp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aframp-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    # Scale on CPU — triggers at 60% utilisation per issue requirement
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    # Scale on memory
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
    # Custom metric: requests per second from Prometheus adapter
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "500"
    # Custom metric: event queue depth (for EDA consumer scaling)
    - type: External
      external:
        metric:
          name: event_queue_depth
          selector:
            matchLabels:
              queue: aframp-events
        target:
          type: AverageValue
          averageValue: "1000"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60   # Cooldown: prevent flapping on scale-up
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # Cooldown: conservative scale-down (5 min)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
