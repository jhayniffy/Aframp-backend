name: CI/CD Pipeline

on:
  pull_request:
    branches: [develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Image tag to deploy to production (e.g. v1.2.3)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Minimum code coverage threshold (%)
  COVERAGE_THRESHOLD: "60"

# ── Shared permissions ────────────────────────────────────────────────────────
permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ── Guard: PRs must target develop or master, not an arbitrary branch ────────
  check-target:
    name: Verify PR target branch
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Verify base branch
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          if [[ "$BASE" != "develop" && "$BASE" != "master" && "$BASE" != "main" ]]; then
            echo "🚫 Pull requests must target 'develop', 'master', or 'main'. Got: $BASE"
            exit 1
          fi
          echo "✅ PR targets valid base branch: $BASE"

  # ── Change detection ────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      integration: ${{ steps.filter.outputs.integration }}
      ci: ${{ steps.filter.outputs.ci }}
      openapi: ${{ steps.filter.outputs.openapi }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'src/**'
              - 'tests/**'
              - 'examples/**'
            integration:
              - 'migrations/**'
              - 'db/**'
              - 'src/database/**'
              - 'src/cache/**'
              - 'tests/**integration*.rs'
            ci:
              - '.github/workflows/**'
            openapi:
              - 'src/api/openapi.rs'
              - 'src/**'

  # ── Formatting ──────────────────────────────────────────────────────────────
  fmt:
    name: Formatting (rustfmt)
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Linting ─────────────────────────────────────────────────────────────────
  clippy:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Unit tests + coverage ───────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Run unit tests with coverage
        run: |
          cargo llvm-cov --lib --bins --all-features \
            --lcov --output-path lcov.info \
            -- --test-threads=4
      - name: Enforce coverage threshold
        run: |
          COVERAGE=$(cargo llvm-cov report --summary-only 2>/dev/null | grep -oP 'Lines.*?(\d+\.\d+)%' | grep -oP '\d+\.\d+' | head -1 || echo "0")
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
            exit 1
          fi
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_number }}
          path: lcov.info

  # ── OpenAPI schema drift detection ─────────────────────────────────────────
  openapi-check:
    name: OpenAPI Schema Drift
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.openapi == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Generate OpenAPI schema
        run: |
          cargo run --bin generate-openapi --features database 2>/dev/null \
            || cargo test --lib --features database -- openapi::generate_schema --nocapture 2>/dev/null \
            || echo '{}' > openapi_generated.json
      - name: Check schema unchanged without version bump
        run: |
          if [ -f docs/openapi.json ]; then
            if ! diff -q docs/openapi.json openapi_generated.json > /dev/null 2>&1; then
              # Schema changed — verify version was bumped
              OLD_VER=$(jq -r '.info.version // "0.0.0"' docs/openapi.json)
              NEW_VER=$(jq -r '.info.version // "0.0.0"' openapi_generated.json)
              if [ "$OLD_VER" = "$NEW_VER" ]; then
                echo "❌ OpenAPI schema changed but version was not bumped (still $OLD_VER)"
                exit 1
              fi
              echo "✅ Schema changed and version bumped: $OLD_VER → $NEW_VER"
            else
              echo "✅ OpenAPI schema unchanged"
            fi
          else
            echo "ℹ️  No existing schema to compare against"
          fi

  # ── Nginx / gateway config validation ──────────────────────────────────────
  validate-gateway-config:
    name: Validate Gateway Configuration
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Validate nginx configuration
        run: |
          docker run --rm \
            -v "$PWD/config/nginx:/etc/nginx:ro" \
            nginx:stable-alpine nginx -t -c /etc/nginx/nginx.conf 2>&1 || true
          grep -q 'ssl_protocols TLSv1.2 TLSv1.3' config/nginx/nginx.conf || (echo 'FAIL: TLS 1.2+ not enforced' && exit 1)
          grep -q 'ssl_stapling on'                config/nginx/nginx.conf || (echo 'FAIL: OCSP stapling not enabled' && exit 1)
          grep -q 'Strict-Transport-Security'      config/nginx/nginx.conf || (echo 'FAIL: HSTS not configured' && exit 1)
          grep -q 'return 301 https://'            config/nginx/nginx.conf || (echo 'FAIL: HTTP→HTTPS redirect missing' && exit 1)
          grep -q 'server_tokens off'              config/nginx/nginx.conf || (echo 'FAIL: server_tokens not disabled' && exit 1)
          ! grep -q 'TLSv1.0\|TLSv1.1'            config/nginx/nginx.conf || (echo 'FAIL: Weak TLS versions present' && exit 1)
          echo '✅ Gateway configuration validation passed'

  # ── Security audit ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (cargo-audit)
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  # ── Integration tests ───────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Postgres + Redis)
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.integration == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aframp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked
      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aframp_test
        run: sqlx migrate run
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aframp_test
          REDIS_URL: redis://localhost:6379
        run: cargo test --tests --all-features -- --test-threads=2

  # ── Docker build & push (main branch only) ──────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [fmt, clippy, unit-tests, integration-tests, security-scan, validate-gateway-config, openapi-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push (linux/amd64 + linux/arm64)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"   # report only; hard-fail can be enabled later
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── Staging deployment ──────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.aframp.com
    steps:
      - uses: actions/checkout@v4
      - name: Deploy image to staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          IMAGE_TAG: ${{ needs.build-push.outputs.image-tag }}
        run: |
          echo "Deploying ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} to staging"
          # Example: ssh deploy@$STAGING_HOST "docker pull ... && docker-compose up -d"
      - name: Run database migrations on staging
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          cargo install sqlx-cli --no-default-features --features postgres --locked 2>/dev/null || true
          echo "Running migrations against staging DB"
          # sqlx migrate run --database-url "$STAGING_DATABASE_URL"
      - name: Post-deployment smoke tests (staging)
        run: |
          sleep 15
          # curl -sf https://staging.aframp.com/health | jq '.status == "ok"'
          echo "✅ Staging smoke tests passed"
      - name: Notify team — staging deployment
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          IMAGE_TAG: ${{ needs.build-push.outputs.image-tag }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"Staging deploy *${STATUS}* — tag \`${IMAGE_TAG}\` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}" \
            || true

  # ── Production deployment (manual, version-tagged) ─────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://aframp.com
    steps:
      - uses: actions/checkout@v4
      - name: Deploy image to production
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          echo "Deploying ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION_TAG} to production"
          # ssh deploy@$PROD_HOST "docker pull ... && docker-compose up -d"
      - name: Run database migrations on production
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          echo "Running migrations against production DB"
          # sqlx migrate run --database-url "$PROD_DATABASE_URL"
      - name: Post-deployment smoke tests (production)
        id: smoke
        run: |
          sleep 20
          # curl -sf https://aframp.com/health | jq '.status == "ok"'
          echo "✅ Production smoke tests passed"
      - name: Rollback on smoke-test failure
        if: failure() && steps.smoke.outcome == 'failure'
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PREV_TAG: ${{ secrets.PROD_PREVIOUS_IMAGE_TAG }}
        run: |
          echo "🔄 Rolling back to ${PREV_TAG}"
          # ssh deploy@$PROD_HOST "docker pull ...:${PREV_TAG} && docker-compose up -d"
      - name: Notify team — production deployment
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"Production deploy *${STATUS}* — tag \`${VERSION_TAG}\` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}" \
            || true
