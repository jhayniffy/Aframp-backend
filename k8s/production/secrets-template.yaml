---
# Template for production secrets
# DO NOT commit actual secrets to git
# Use sealed-secrets or external secrets operator in production

apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: aframp-production
type: Opaque
stringData:
  url: "postgresql://user:password@cockroachdb.aframp.internal:26257/aframp?sslmode=verify-full"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: aframp-production
type: Opaque
stringData:
  url: "rediss://:AUTH_TOKEN@redis-primary.aframp.internal:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: aframp-production
type: Opaque
stringData:
  secret: "REPLACE_WITH_SECURE_RANDOM_STRING"
---
apiVersion: v1
kind: Secret
metadata:
  name: stellar-keys
  namespace: aframp-production
type: Opaque
stringData:
  signing-key: "REPLACE_WITH_STELLAR_SECRET_KEY"
