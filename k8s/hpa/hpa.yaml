apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aframp-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aframp-backend

  minReplicas: 2
  maxReplicas: 20

  metrics:
    # --- CPU utilisation ---
    # Scale out when average CPU across all pods exceeds 70%.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # --- Custom metric: requests per second per pod ---
    # Sourced from aframp_http_requests_total via Prometheus Adapter.
    # Scale out when any pod handles more than 80 req/s (80% of the 100 req/s
    # target defined in the Prometheus Adapter config).
    - type: Pods
      pods:
        metric:
          name: requests_per_second
        target:
          type: AverageValue
          averageValue: "80"

  behavior:
    scaleUp:
      # React quickly to traffic spikes: allow doubling pods every 60 s.
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      # Stabilisation window prevents flapping after transient spikes.
      # Wait 5 minutes of sustained low load before removing pods.
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25          # remove at most 25% of pods per period
          periodSeconds: 60
      selectPolicy: Min
